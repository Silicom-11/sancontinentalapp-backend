# IEP Continental Americano - Backend (Spring Boot)
spring.application.name=continental-americano-backend
# Render inyecta la variable PORT en runtime; localmente cae a 5000.
server.port=${PORT:5000}

# MongoDB. Use MONGODB_URI for Atlas in real deployments.
# Local fallback keeps the repository safe: no credentials are stored in source control.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/iep_continental_db}
spring.data.mongodb.auto-index-creation=true

# JWT Configuration. Override JWT_SECRET in production.
jwt.secret=${JWT_SECRET:continental_dev_jwt_secret_key_2026_change_me}
jwt.expiration=604800000
jwt.refresh-expiration=2592000000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudflare R2 (S3-compatible) - optional
r2.account-id=${R2_ACCOUNT_ID:}
r2.endpoint=${R2_ENDPOINT:}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.bucket=${R2_BUCKET:continental-files}
r2.bucket-name=${R2_BUCKET_NAME:continental-files}
r2.public-url=${R2_PUBLIC_URL:}

# CORS - allow Android emulator and web clients. La app Android nativa no envía Origin,
# por lo que "*" es seguro aquí; en producción restringe si agregas un frontend web.
cors.allowed-origins=${CORS_ORIGINS:*}

# App
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Scheduled maintenance
maintenance.location-retention-days=${LOCATION_RETENTION_DAYS:30}
maintenance.cleanup-cron=${LOCATION_CLEANUP_CRON:0 0 2 * * *}

# Logging (Logback - requerido por rubrica)
logging.level.root=INFO
logging.level.com.iepca=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/continental-americano.log

# Firebase - optional
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.private-key=${FIREBASE_PRIVATE_KEY:}
firebase.client-email=${FIREBASE_CLIENT_EMAIL:}

# Mail - optional
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@example.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

